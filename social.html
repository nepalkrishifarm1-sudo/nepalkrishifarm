<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Links</title>
<style>
  :root{
    --bg:#0f0f12;
    --card:#18181c;
    --ig: linear-gradient(135deg,#feda75 0%,#fa7e1e 25%,#d62976 50%,#962fbf 75%,#4f5bd5 100%);
    --fb:#1877F2;
    --tt-bg:#000000;
    --yt:#FF0000;
    --radius:28px;
    --gap:20px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:24px;
  }

  .wrap{
    width:100%;
    max-width:340px;
    text-align:center;
  }

  h1{
    color:#f5f5f7;
    font-size:20px;
    font-weight:600;
    letter-spacing:0.3px;
    margin:0 0 24px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:var(--gap);
  }

  .tile{
    aspect-ratio:1/1;
    border-radius:var(--radius);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-decoration:none;
    color:#fff;
    font-weight:600;
    font-size:15px;
    letter-spacing:0.2px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }

  .tile:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 22px rgba(0,0,0,0.35);
  }

  .tile:active{
    transform:translateY(0);
  }

  .tile svg{
    width:34px;
    height:34px;
  }

  .instagram{ background:var(--ig); }
  .facebook{ background:var(--fb); }
  .tiktok{ background:var(--tt-bg); border:1px solid #2a2a2a; }
  .youtube{ background:var(--yt); }

  @media (max-width:360px){
    .tile{ font-size:13px; }
    .tile svg{ width:28px; height:28px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <h1>Connect with us</h1>
  <div class="grid">

    <!-- Instagram -->
    <a class="tile instagram" href="https://instagram.com/nepal.krishi.farm" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="20" height="20" rx="6" stroke="white" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4.6" stroke="white" stroke-width="1.8"/>
        <circle cx="17.3" cy="6.7" r="1.1" fill="white"/>
      </svg>
      Instagram
    </a>

    <!-- Facebook -->
    <a class="tile facebook" href="https://facebook.com/nepalkrishifarm1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.5 8.5H13.8c-.6 0-1 .5-1 1.1V12h2.6l-.4 2.7h-2.2V21h-2.8v-6.3H8v-2.7h2v-2.1c0-2 1.3-3.9 3.6-3.9h1.9v2.5z" fill="white"/>
      </svg>
      Facebook
    </a>

    <!-- TikTok -->
    <a class="tile tiktok" href="https://tiktok.com/@nepal.krishi.farm" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.5 2.5c.4 2.2 1.8 3.7 4 3.9v2.7c-1.4.1-2.7-.3-4-1.1v6.4a5.6 5.6 0 1 1-5.6-5.6c.3 0 .6 0 .9.1v2.8a2.8 2.8 0 1 0 2 2.7V2.5h2.7z" fill="white"/>
      </svg>
      TikTok
    </a>

    <!-- YouTube 
    <a class="tile youtube" href="https://youtube.com/@yourhandle" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="5.5" width="20" height="13" rx="4" stroke="white" stroke-width="1.8"/>
        <path d="M10.5 9.5v5l4.3-2.5-4.3-2.5z" fill="white"/>
      </svg>
      YouTube
    </a>
-->
  </div>
</div>

</body>
</html>
